server {
    listen 80;
    server_name 122.51.70.160;

    # 日志配置
    access_log /var/log/nginx/arktab-access.log;
    error_log /var/log/nginx/arktab-error.log;

    # 客户端最大上传大小
    client_max_body_size 10M;

    # API路由 - 对所有人开放
    location /api/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 后台管理页面 - 隐藏在/developer路径
    location /developer {
        proxy_pass http://localhost:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 根路径 - 返回API状态信息
    location = / {
        return 200 '{"status":"running","version":"v2.0","message":"Arktab API Server","api_endpoints":"/api/*","admin_panel":"/developer"}';
        add_header Content-Type application/json;
    }

    # 其他路径 - 返回404
    location / {
        return 404 '{"error":"Not Found","message":"Please use /api/* for API endpoints or /developer for admin panel"}';
        add_header Content-Type application/json;
    }
}
